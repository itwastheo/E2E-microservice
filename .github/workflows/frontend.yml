name: Frontend CI/CD

on:
  push:
    paths:
      - 'frontend/**'
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'itwastheo/e2e-frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '0' # Don't fail yet, just report
          severity: 'CRITICAL,HIGH'

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            itwastheo/e2e-frontend:latest
            itwastheo/e2e-frontend:${{ github.sha }}